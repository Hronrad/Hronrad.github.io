<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="page_title"></title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="glass-theme.css?v=20260413z">
</head>
<body>
    <audio id="bgm-audio" preload="auto"></audio>
    <div class="glass-noise-overlay" aria-hidden="true"></div>
    <div class="glass-blob glass-blob-1" aria-hidden="true"></div>
    <div class="glass-blob glass-blob-2" aria-hidden="true"></div>
    <div class="glass-blob glass-blob-3" aria-hidden="true"></div>

    <div class="top-bar">
        <span class="site-title">
            <span id="site-title-text" data-i18n="site_title"></span>
            <span id="site-subtitle-text" class="site-subtitle" data-i18n="site_subtitle"></span>
        </span>
        <span class="bgm-btn" id="bgm-toggle" role="button" tabindex="0" aria-label="Toggle background music">
            <span id="bgm-text" class="bgm-text">AUDIO: OFF</span>
            <img id="bgm-icon" src="assets/soundon.jpeg" alt="BGM toggle icon">
        </span>
    </div>

    <div class="bottom-bar">
        <button class="lang-toggle" id="lang-btn">English</button>
        <div class="sys-status-bar" id="default-sys-status">
            <span>SYS.STATUS [ ONLINE ]</span>
            <a href="#media">MEDIA</a>
            <a href="#github">GITHUB</a>
            <a href="mailto:hronrad@smail.nju.edu.cn">EMAIL</a>
        </div>
    </div>

    <button id="explore-back-btn" class="nav-back-btn" type="button" data-i18n="btn_back"></button>
    <div id="playground-hue-controls" class="playground-hue-controls pixel-panel">
        <label for="hueSlider" data-i18n="ctrl_hue"></label>
        <input type="range" id="hueSlider" min="0" max="359" value="170">
        <span id="valHue">170</span>
    </div>

    <canvas id="bg-canvas"></canvas>

    <nav id="left-sidebar">
        <ul class="nav-list">
            <li><a href="#home" class="active" data-i18n="nav_home" data-glass-i18n="glass_nav_home"></a></li>
            <li><a href="#intro" data-i18n="nav_intro" data-glass-i18n="glass_nav_intro"></a></li>
            <li><a href="#media" data-i18n="nav_media" data-glass-i18n="glass_nav_media"></a></li>
            <li><a href="#github" data-i18n="nav_github" data-glass-i18n="glass_nav_github"></a></li>
            <li><a href="#research" data-i18n="nav_research" data-glass-i18n="glass_nav_research"></a></li>
            <li><a href="#explore" data-i18n="nav_explore" data-glass-i18n="glass_nav_explore"></a></li>
        </ul>
    </nav>

    <div class="vertical-controls">
        <div class="v-slider-group">
            <span id="valStates">10</span>
            <input type="range" id="statesSlider" min="2" max="20" value="10" orient="vertical">
            <label data-i18n="ctrl_trail"></label>
        </div>
        <div class="v-slider-group">
            <span id="valFps">15</span>
            <input type="range" id="fpsSlider" min="5" max="60" value="15" orient="vertical">
            <label data-i18n="ctrl_fps"></label>
        </div>
        <div id="resetCard" class="v-slider-group reset-card">
            <button id="resetAutomataBtn" class="reset-btn" type="button" data-i18n="btn_reset"></button>
        </div>
    </div>

    <section id="glass-hero" class="glass-hero" aria-hidden="true">
        <div id="glass-hero-text" class="glass-hero-text">
            <h1>HRONRAD</h1>
            <h1 class="glass-hero-outline">HRONRAD</h1>
        </div>
    </section>

    <div id="glass-marquee" class="glass-marquee" aria-hidden="true">
        <div class="glass-marquee-track">
            <span data-i18n-html="intro_text"></span>
            <span data-i18n-html="intro_text"></span>
        </div>
    </div>

    <section id="glass-content-section" class="glass-content-section">
        <div class="glass-content-grid" aria-hidden="true"></div>
    </section>

    <main id="page-home" class="pixel-panel page-panel active">
        <p class="intro home-intro" data-i18n-html="intro_text"></p>
    </main>

    <main id="page-intro" class="pixel-panel page-panel">
        <div class="glass-collage-scene" aria-hidden="true">
            <div class="glass-collage-card glass-collage-card-1">
                <div class="glass-duct-tape glass-duct-tape-top">REJECTED_ASSET</div>
                <div class="glass-duct-tape glass-duct-tape-bottom">OVERRIDE</div>
                <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=600" alt="Abstract collage">
                <div class="glass-collage-code">||| || | ||| |</div>
            </div>
            <div class="glass-collage-card glass-collage-card-2">
                <div class="glass-warning-frame">
                    <div class="glass-warning-inner">
                        <h3>SYS<br>FAIL</h3>
                        <p>FATAL_ERROR:<br>MEMORY_LEAK_DETECTED</p>
                        <p>HASH: 0xDEAD...BEEF</p>
                    </div>
                </div>
            </div>
            <div class="glass-energy-card">
                <span>Energy</span>
            </div>
        </div>
        <div class="intro-sections">
            <section class="intro-section">
                <p class="bio-text">
                    <span class="intro-topic" data-i18n="intro_heading_consciousness"></span>
                    <span data-i18n="intro_body_consciousness"></span>
                </p>
            </section>
            <section class="intro-section">
                <p class="bio-text">
                    <span class="intro-topic" data-i18n="intro_heading_nature"></span>
                    <span data-i18n="intro_body_nature"></span>
                </p>
            </section>
            <section class="intro-section">
                <p class="bio-text">
                    <span class="intro-topic" data-i18n="intro_heading_art"></span>
                    <span data-i18n="intro_body_art"></span>
                </p>
            </section>
        </div>
    </main>

    <main id="page-media" class="pixel-panel page-panel">
        <h1 data-i18n="nav_media"></h1>
        <div class="card-grid">
            <div class="pixel-card">
                <h3 data-i18n="media_bili_title"></h3>
                <p data-i18n="desc_bili"></p>
                <a href="https://space.bilibili.com/76766417" target="_blank" class="btn-black" data-i18n="btn_watch"></a>
            </div>
            <div class="pixel-card">
                <h3 data-i18n="media_xhs_title"></h3>
                <p data-i18n="desc_xhs"></p>
                <a href="https://www.xiaohongshu.com/user/profile/626e79da000000002102ab9a" target="_blank" class="btn-black" data-i18n="btn_view"></a>
            </div>
            <div class="pixel-card">
                <h3 data-i18n="media_netease_title"></h3>
                <p data-i18n="desc_netease"></p>
                <a href="https://music.163.com/#/user/home?id=357017094" target="_blank" class="btn-black" data-i18n="btn_listen"></a>
            </div>
        </div>
    </main>

    <main id="page-github" class="pixel-panel page-panel">
        <h1 data-i18n="nav_github"></h1>
        <div class="card-grid">
            <div class="pixel-card">
                <h3 data-i18n="repo_title_1"></h3>
                <p data-i18n="repo_1"></p>
                <a href="https://github.com/Hronrad/Automata-Engine" target="_blank" class="btn-black" data-i18n="btn_repo"></a>
            </div>
            <div class="pixel-card">
                <h3 data-i18n="repo_title_2"></h3>
                <p data-i18n="repo_2"></p>
                <a href="https://github.com/Hronrad/LMS-enhancement" target="_blank" class="btn-black" data-i18n="btn_repo"></a>
            </div>
            <div class="pixel-card">
                <h3 data-i18n="repo_title_3"></h3>
                <p data-i18n="repo_3"></p>
                <a href="https://github.com/Hronrad/marper" target="_blank" class="btn-black" data-i18n="btn_repo"></a>
            </div>
            <div class="pixel-card">
                <h3 data-i18n="repo_title_4"></h3>
                <p data-i18n="repo_4"></p>
                <a href="https://github.com/Hronrad/taichi-relativistic_path_tracing" target="_blank" class="btn-black" data-i18n="btn_repo"></a>
            </div>
        </div>
    </main>

    <main id="page-research" class="pixel-panel page-panel">
        <h1 data-i18n="nav_research"></h1>
        <p class="intro" data-i18n="desc_research"></p>
        <div class="card-grid">
            <div class="pixel-card">
                <h3 data-i18n="contact_title"></h3>
                <p data-i18n="contact_desc"></p>
                <a href="mailto:hronrad@smail.nju.edu.cn" class="btn-black" data-i18n="btn_email"></a>
            </div>
        </div>
    </main>

    <main id="page-explore" class="pixel-panel page-panel">
        <h1 data-i18n="nav_explore"></h1>
        <div class="card-grid">
            <div class="pixel-card">
                <h3 data-i18n="explore_title_1"></h3>
                <p data-i18n="explore_desc_1"></p>
                <a href="#explore" id="explore-automata-start" class="btn-black" data-i18n="btn_start"></a>
            </div>
            <div class="pixel-card">
                <h3 data-i18n="explore_title_2"></h3>
                <p data-i18n="explore_desc_2"></p>
                <button id="theme-mode-toggle" class="btn-black btn-black-static" type="button" data-i18n="btn_theme_mode_on"></button>
            </div>
        </div>
    </main>

    <footer id="glass-footer" class="glass-footer">
        <div>SYS.STATUS [ ONLINE ]</div>
        <div class="glass-footer-links">
            <a href="#media">MEDIA</a>
            <a href="#github">GITHUB</a>
            <a href="mailto:hronrad@smail.nju.edu.cn">EMAIL</a>
        </div>
        <div id="glass-footer-year"></div>
    </footer>

    <script src="translations.js"></script>
    <script src="CA.js"></script>
    <script src="app.js"></script>
</body>
</html>
